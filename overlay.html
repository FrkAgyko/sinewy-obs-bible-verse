<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Verse Overlay</title>
  <link rel="stylesheet" href="assets/overlay.css">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes slideDown {
      from { transform: translateY(-40px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* Animations target the text wrapper only. Background/panel never
       fades or slides — but it IS allowed to smoothly transition its
       min-height / max-height so long verses can grow the panel
       gracefully within the 30vh–90vh range. */
    #verse-inner {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      max-height: 90vh !important;
      transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                  min-height 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important;
      will-change: max-height, min-height !important;
    }
    #verse-text-wrap {
      width: 100%;
      opacity: 1;
      transition: none;
    }

    /* ── Position fix ───────────────────────────────────────────────────
       overlay.css gives #verse-inner height:100%, which fills the entire
       full-screen container so flexbox justify-content has nothing to
       align. Fix: make the inner card auto-height and position the
       container itself at the correct edge/centre of the screen.       */
    #verse-inner {
      height: auto !important;
    }

    #verse-container.pos-bottom {
      position: fixed !important;
      top: auto !important;
      bottom: 0 !important;
      height: auto !important;
    }

    #verse-container.pos-top {
      position: fixed !important;
      top: 0 !important;
      bottom: auto !important;
      height: auto !important;
    }

    #verse-container.pos-center {
      position: fixed !important;
      top: 50% !important;
      bottom: auto !important;
      height: auto !important;
      transform: translateY(-50%) !important;
    }
  </style>
</head>
<body>

  <!-- Fullscreen background (image mode only, sits behind the card) -->
  <div id="bg-layer" class="hidden"></div>

  <div id="verse-container" class="hidden theme-gold pos-bottom fs-md anim-fade">
    <div id="verse-inner">
      <div id="verse-text-wrap">
        <p id="overlay-text"></p>
        <span class="verse-accent"></span>
        <p id="overlay-reference"></p>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    (() => {
      try {
      const bgLayer   = document.getElementById('bg-layer');
      const container = document.getElementById('verse-container');
      const inner     = document.getElementById('verse-inner');
      const textWrap  = document.getElementById('verse-text-wrap');
      const textEl    = document.getElementById('overlay-text');
      const refEl     = document.getElementById('overlay-reference');

      const THEME_CLASSES = ['theme-gold', 'theme-white', 'theme-dark', 'theme-custom', 'theme-sacred-light'];
      const POS_CLASSES   = ['pos-bottom', 'pos-center', 'pos-top'];
      const SIZE_CLASSES  = ['fs-sm', 'fs-md', 'fs-lg', 'fs-xl'];
      const ANIM_CLASSES  = ['anim-fade', 'anim-slide', 'anim-none'];

      // Base card background colours per preset theme
      const THEME_BG = { gold: '#080810', white: '#ffffff', dark: '#0a0e14' };

      const loadedFonts = new Set();

      // Font size ranges per size class (px)
      const SIZE_RANGE = {
        'fs-sm': { min: 28, max: 36 },
        'fs-md': { min: 36, max: 48 },
        'fs-lg': { min: 48, max: 60 },
        'fs-xl': { min: 60, max: 72 },
      };

      function scaleText(text, sizeClass) {
        const range = SIZE_RANGE[sizeClass] || SIZE_RANGE['fs-md'];
        const len   = text.length;

        let size;
        if (len < 100) {
          size = range.max;
        } else if (len > 200) {
          size = range.min;
        } else {
          // Linear interpolation across the 100–200 char range
          const t = (len - 100) / 100;
          size = Math.round(range.max - t * (range.max - range.min));
        }

        textEl.style.fontSize = size + 'px';
      }

      function hexToRgba(hex, alpha) {
        const h = (typeof hex === 'string' ? hex : '').replace('#', '');
        if (!/^[0-9a-fA-F]{6}$/.test(h)) return `rgba(8, 8, 16, ${Math.max(0, Math.min(1, alpha))})`;
        const r = parseInt(h.slice(0, 2), 16);
        const g = parseInt(h.slice(2, 4), 16);
        const b = parseInt(h.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${Math.max(0, Math.min(1, alpha))})`;
      }

      function ensureFont(fontName) {
        if (loadedFonts.has(fontName)) return;
        const font = BibleApp.CHURCH_FONTS.find(f => f.value === fontName);
        if (font && font.google) {
          const link = document.createElement('link');
          link.rel  = 'stylesheet';
          link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fontName)}:ital,wght@0,400;0,600;1,400&display=swap`;
          document.head.appendChild(link);
        }
        loadedFonts.add(fontName);
      }

      function applyClass(group, value) {
        group.forEach(c => container.classList.remove(c));
        container.classList.add(value);
      }

      function applyStyles(state) {
        state.position  = state.position  || 'bottom';
        state.fontSize  = state.fontSize  || 'md';
        state.animation = state.animation || 'none';

        const theme   = state.theme   || 'gold';
        const opacity = (state.opacity !== undefined ? state.opacity : 90) / 100;
        const font    = state.font    || 'Georgia';
        const bgMode  = state.bgMode  || 'color';
        const colors  = state.customColors ||
          (typeof BibleApp !== 'undefined' && BibleApp.DEFAULTS && BibleApp.DEFAULTS.customColors) ||
          { bg: '#080810', text: '#f0e6c4', ref: '#c9a84c' };

        applyClass(THEME_CLASSES, `theme-${theme}`);
        applyClass(POS_CLASSES,   `pos-${state.position}`);
        applyClass(SIZE_CLASSES,  `fs-${state.fontSize}`);
        applyClass(ANIM_CLASSES,  `anim-${state.animation}`);

        // ── Determine if a background image should fill the verse box ─
        const useImageBg = (theme === 'sacred-light') ||
                           (bgMode === 'image' && !!state.bgImage);

        // ── Card visibility ───────────────────────────────────────────
        // Image background always shows the card (it fills the verse box).
        // Custom theme without an image respects the card checkbox.
        const showCard = useImageBg ? true : (state.showCard !== false);
        container.classList.toggle('no-card', !showCard);

        // ── bg-layer is never used for fullscreen images any more ─────
        bgLayer.style.backgroundImage = '';
        bgLayer.classList.add('hidden');

        // ── Card / inner background ───────────────────────────────────
        // Clear all inline bg properties first to avoid stale values
        // when switching between image and colour modes.
        inner.style.background         = '';
        inner.style.backgroundImage    = '';
        inner.style.backgroundSize     = '';
        inner.style.backgroundPosition = '';
        inner.style.backgroundRepeat   = '';
        inner.style.backgroundColor    = '';

        if (useImageBg) {
          const imgUrl = (theme === 'sacred-light') ? 'assets/bg1.png' : state.bgImage;
          inner.style.backgroundImage    = `url(${imgUrl})`;
          inner.style.backgroundSize     = 'cover';
          inner.style.backgroundPosition = 'center';
          inner.style.backgroundRepeat   = 'no-repeat';
        } else if (showCard) {
          const bgHex = theme === 'custom' ? colors.bg : (THEME_BG[theme] || '#080810');
          inner.style.background = hexToRgba(bgHex, opacity);
        } else {
          inner.style.backgroundColor = 'transparent';
        }

        // ── Custom text colours ───────────────────────────────────────
        if (theme === 'custom') {
          textEl.style.color = colors.text || '#ffffff';
          refEl.style.color  = colors.ref  || '#cccccc';
          inner.style.setProperty('--accent-color', colors.ref || '#cccccc');
        } else {
          textEl.style.color = '';
          refEl.style.color  = '';
          inner.style.removeProperty('--accent-color');
        }

        // ── Font ──────────────────────────────────────────────────────
        ensureFont(font);
        inner.style.fontFamily = `'${font}', Georgia, 'Times New Roman', serif`;
        textEl.style.fontStyle = state.italic ? 'italic' : 'normal';
      }

      function showVerse(state) {
        // If the panel is already visible, treat this as Next/Previous navigation.
        const wasVisible = !container.classList.contains('hidden');

        // Clear any in-progress text animation.
        inner.style.animation = '';
        textWrap.style.animation = '';

        applyStyles(state);

        // Background/panel appears instantly — never animates.
        container.classList.remove('hidden');

        const animVal   = state.animation || 'fade';
        const sizeClass = `fs-${state.fontSize || 'md'}`;

        const swapText = () => {
          textEl.textContent = state.text;
          refEl.textContent  = state.reference;
          scaleText(state.text, sizeClass);
        };

        const animateTextIn = () => {
          if (animVal === 'none') {
            textWrap.style.animation = '';
            textWrap.style.opacity   = '1';
            textWrap.style.transform = 'none';
            return;
          }
          const animName = (animVal === 'slide')
            ? (container.classList.contains('pos-top') ? 'slideDown' : 'slideUp')
            : 'fadeIn';
          textWrap.style.animation = 'none';
          void textWrap.offsetWidth; // force reflow so animation replays
          textWrap.style.animation = `${animName} 0.6s ease forwards`;
        };

        if (wasVisible && animVal !== 'none') {
          // NEXT/PREVIOUS: quick 0.2s fade of old text, then animate new text in.
          textWrap.style.animation = 'none';
          void textWrap.offsetWidth;
          textWrap.style.animation = 'fadeOut 0.2s ease forwards';

          let done = false;
          const advance = () => {
            if (done) return;
            done = true;
            swapText();
            animateTextIn();
          };
          const fallback = setTimeout(advance, 230);
          textWrap.addEventListener('animationend', () => {
            clearTimeout(fallback);
            advance();
          }, { once: true });
        } else {
          // Fresh show (or anim-none while visible): swap and animate in immediately.
          swapText();
          animateTextIn();
        }
      }

      function hideVerse(state) {
        applyStyles(state);

        const animVal = state.animation || 'fade';

        // anim-none: background and text disappear instantly together.
        if (animVal === 'none') {
          textWrap.style.animation = '';
          container.classList.add('hidden');
          bgLayer.classList.add('hidden');
          return;
        }

        // Text animates out first, then the background/panel is hidden.
        textWrap.style.animation = 'none';
        void textWrap.offsetWidth;
        textWrap.style.animation = 'fadeOut 0.5s ease forwards';

        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          textWrap.style.animation = '';
          container.classList.add('hidden');
          bgLayer.classList.add('hidden');
        };
        const fallback = setTimeout(finish, 650);
        textWrap.addEventListener('animationend', () => {
          clearTimeout(fallback);
          finish();
        }, { once: true });
      }

      function clearVerse() {
        container.classList.remove('visible');
        container.classList.add('hidden');
        bgLayer.classList.add('hidden');
        textEl.textContent = '';
        refEl.textContent  = '';
      }

      function handleMessage(state) {
        switch (state.action) {
          case 'show':  showVerse(state);  break;
          case 'hide':  hideVerse(state);  break;
          case 'clear': clearVerse();      break;
        }
      }

      BibleApp.initChannel('overlay', handleMessage);
      } catch (e) {
        console.error('[BibleApp] overlay init failed:', e);
      }
    })();
  </script>

</body>
</html>
